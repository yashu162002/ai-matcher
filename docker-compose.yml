# AI Resume Matcher - Docker Compose
# Run backend services individually first, then use this for reference.
# Or deploy with: docker-compose up -d

version: "3.8"

services:
  auth-service:
    build: ./backend/auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker

  resume-service:
    build: ./backend/resume-service
    ports:
      - "8082:8082"
    depends_on:
      - auth-service

  job-service:
    build: ./backend/job-service
    ports:
      - "8083:8083"
    depends_on:
      - auth-service

  matching-service:
    build: ./backend/matching-service
    ports:
      - "8084:8084"
    depends_on:
      - resume-service
      - job-service

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    command: npm run dev
